<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="none">
  <!-- Base47 Icon Gradient - WordPress Layout with Rounded Corners & Gradients -->
  
  <defs>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fb6340;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5365c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="darkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#32325d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d2f48;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Left Column (tall) - Orange gradient -->
  <rect x="2" y="2" width="5.5" height="11.5" rx="0.8" fill="url(#orangeGrad)"/>
  
  <!-- Top Middle Square - Dark gradient -->
  <rect x="8" y="2" width="5.5" height="5.5" rx="0.8" fill="url(#darkGrad)"/>
  
  <!-- Middle Square (below top) - Dark gradient -->
  <rect x="8" y="8" width="5.5" height="5.5" rx="0.8" fill="url(#darkGrad)"/>
  
  <!-- Bottom Wide Rectangle - Orange gradient -->
  <rect x="2" y="14" width="11.5" height="4" rx="0.8" fill="url(#orangeGrad)"/>
  
  <!-- Right Column (tall) - Dark gradient -->
  <rect x="14" y="2" width="5.5" height="16" rx="0.8" fill="url(#darkGrad)"/>
</svg>
