<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
  <!-- Base47 Icon Monochrome - WordPress Layout with Rounded Corners -->
  
  <!-- Left Column (tall) -->
  <rect x="2" y="2" width="5.5" height="11.5" rx="0.8" fill="currentColor" opacity="0.7"/>
  
  <!-- Top Middle Square -->
  <rect x="8" y="2" width="5.5" height="5.5" rx="0.8" fill="currentColor"/>
  
  <!-- Middle Square (below top) -->
  <rect x="8" y="8" width="5.5" height="5.5" rx="0.8" fill="currentColor"/>
  
  <!-- Bottom Wide Rectangle -->
  <rect x="2" y="14" width="11.5" height="4" rx="0.8" fill="currentColor" opacity="0.7"/>
  
  <!-- Right Column (tall) -->
  <rect x="14" y="2" width="5.5" height="16" rx="0.8" fill="currentColor"/>
</svg>
